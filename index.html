<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Campaign Delivery Report Prototype</title>
  <style>
    :root {
      --bsm-blue: #3550a5;
      --bsm-blue-2: #2c4696;
      --bsm-blue-3: #4766bb;
      --bsm-light: #f1f1f1;
      --ink: #161616;
      --muted: #6f7892;
      --red: #e53935;
      --grey-bar: #d8d8d8;

      --site-col: 25px;
      --loc-col: 2.15fr;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #e8ecf7;
      color: var(--ink);

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 200;
      background: #0f1834;
      color: #fff;
      padding: 14px 16px;

      gap: 10px;

      border-bottom: 1px solid rgba(255,255,255,.1);

    .toolbar .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .toolbar label { font-size: 12px; color: #dbe4ff; font-weight: 700; text-transform: uppercase; }
    .toolbar input, .toolbar select, .toolbar button {
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.16);
      padding: 0 12px;
      font-size: 14px;
      width: 100%;
    }
    .toolbar input, .toolbar select { background: #fff; color: #111; }
    .toolbar button {
      background: var(--bsm-blue-3);
      color: #fff;
      font-weight: 800;

      border: none;

    .bar2 {

      color: #fff;

      gap: 10px;
      grid-template-columns: 1fr 1fr;
      align-items: start;
    }
    .region-box {

      border: 1px solid rgba(255,255,255,.08);

      padding: 12px;
    }
    .region-title { font-weight: 800; font-size: 13px; text-transform: uppercase; color: #dbe4ff; margin-bottom: 10px; }
    .region-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
    }
    .region-pill {
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,.08);

      padding: 8px 10px;
      font-size: 13px;
    }
    .status-box {

      padding: 12px;

    .document {

    .page {

    .cover-page,
    .contact-page {

    }
    .cover-header {
      padding: 92px 88px 0;
      display: flex;
      flex-direction: column;
      align-items: center;

    .logo-img {

    .logo-mark {

      align-items: center;

      font-weight: 900;
      letter-spacing: .02em;
      color: #fff;

    .logo-badge {
      border: 4px solid rgba(255,255,255,.9);
      border-radius: 6px;
      padding: 12px 18px;
      font-size: 44px;
      line-height: 1;
    }
    .logo-text { font-size: 38px; line-height: .95; }
    .subbrand {
      border-top: 3px solid rgba(255,255,255,.75);
      padding-top: 10px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .cover-title {
      margin-top: 74px;
      font-size: 30px;
      text-align: center;
      font-weight: 900;
      line-height: 1.05;
      text-transform: uppercase;
    }
    .cover-grid {
      width: 550px;
      margin: 48px auto 0;

      grid-template-columns: 1fr 1fr;
      row-gap: 12px;

      font-size: 19px;
      font-weight: 700;

    .cover-grid .label { opacity: .95; }
    .cover-grid .value { text-align: right; }
    .cover-site {

      text-align: center;
      font-size: 22px;
      font-weight: 800;
      padding-bottom: 56px;
    }

    .inner-header {
      display: flex;
      justify-content: space-between;
      padding: 22px 26px 10px;
      color: #222;
      font-size: 18px;
      border-bottom: 1px solid #d7d7d7;

    .overview-page, .progress-page, .detail-page, .proof-page {
      background: #efefef;
    }
    .overview-body { padding: 18px 42px 24px; flex: 1; display: flex; flex-direction: column; }
    .overview-top {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 15px;
      align-items: start;
    }
    .overview-right {
      display: flex;

    .overview-right-top {

    .ring-col {

    .ring {

    }
    .ring.small {
      background: none;
    }
    .ring.small::before {
      background-image: url("img/10market.png");
    }
    .platform-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; padding-top: 10px;
    }
    .pstat { display: grid; grid-template-columns: 54px 1fr; gap: 12px; align-items: center; }
    .picon {
      width: 54px; height: 54px; border-radius: 50%; border: 3px solid #6d89cb;
      display: flex; align-items: center; justify-content: center; color: #6d89cb; font-size: 22px; font-weight: 900;
      background: #fff;
    }
    .ptext .name { font-size: 18px; font-weight: 800; color: #222; }
    .ptext .val { font-size: 15px; font-weight: 800; color: var(--bsm-blue-3); }    .overview-info {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.45;
      padding-top: 6px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      column-gap: 20px;
      row-gap: 6px;
      align-items: center;
      width: 100%;
      min-width: 0;
    }

    .overview-info > div {
      min-width: 0;
    }

    .overview-info .info-label {
      white-space: nowrap;
    }

    .overview-info .info-value {
      justify-self: end;
      text-align: right;
      white-space: nowrap;
      display: inline-block;
      width: auto;
      max-width: none;
      overflow: visible;
      font-size: 18px;
      transform-origin: right center;
    }
   .overview-table {
      margin-top: 0;
      margin-bottom: 20px;
      background: #dddddd;
      border-radius: 2px;
      overflow: hidden;
      width: 100%;
    }
    .ot-head, .ot-row {
      display: grid;
      grid-template-columns: 27% 30% 13% 16% 14%;
      align-items: center;
    }
    .ot-head {
      background: #d8d8d8;
      padding: 6px 14px;
      font-weight: 800;
      font-size: 15px;
    }
    .ot-row {
      padding: 4px 14px;
      border-top: 1px solid rgba(0,0,0,.05);
      background: #e7e7e7;
      min-height: 39px;
      font-size: 16px;
    }
    .market-name {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 18px;
      align-items: center;
      white-space: nowrap;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .bar {
      display: block;   /* 关键，不然 width 不生效 */
      height: 18px;
      border-radius: 0;
      background: linear-gradient(90deg, #557dca, #2f4ca3);
    }
    .overview-banner {
      margin-top: auto;
      background: var(--bsm-blue);
      color: #fff;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 14px 24px;
      gap: 0;
      align-items: center;
    }
    .ob-item {
      text-align: center;
      font-weight: 800;
      position: relative;
      min-height: 48px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .ob-item + .ob-item::before {
      content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px; background: rgba(255,255,255,.55);
    }
    .ob-item .n { font-size: 24px; }
    .ob-item .t { font-size: 24px; }

    .small-footer {
      margin-top: 16px;
      padding: 0 26px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  .footer-strip {
    width: auto;      /* ❗不要固定210px */
    height: auto;
    background: none; /* ❗去掉蓝底 */
  }

  .footer-logo {
    height: 30px;
  }
    .footer-url { font-size: 16px; font-weight: 800; color: #fff; }
    .small-footer.blue {
      background: linear-gradient(120deg, #2a4498, #3f61bc);
      margin: 20px 0 0;
      padding: 0 18px;
      min-height: 60px;
      width: 100%;
    }

    .progress-body { padding: 18px 42px 18px; flex: 1; display: flex; flex-direction: column; }
    .progress-info {
      background: #f7f7f7;
      border: 1px solid #d4d4d4;
      padding: 18px 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.55;
    }
    .progress-line {
      display: grid;
      grid-template-columns: 200px minmax(0, 1fr);
      column-gap: 20px;
      align-items: start;
    }
    .progress-line .pl-label { white-space: nowrap; }
    .progress-line .pl-value {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .charts {
      margin-top: 30px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px;
    }
    .chart-card { text-align: center; }
    .chart-title { font-weight: 900; font-size: 20px; margin-bottom: 12px; }
    .fake-chart {
      height: 210px; background:
        repeating-linear-gradient(to top, transparent 0 40px, rgba(0,0,0,.11) 40px 42px),
        transparent;
      position: relative; margin: 0 20px 18px;
      border-bottom: 2px solid #b6b6b6;
    }

    .bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .bar-value {
      font-size: 22px;
      font-weight: 900;
      color: var(--bsm-blue);
    }

    .bar-value.contract {
      color: #a9adbd;
    }

    .extra-arrow {
      float: right;
      color: var(--red);
      font-size: 44px;
      font-weight: 900;
      line-height: 1;
    }

    .fake-bars {
      position: absolute;
      left: 34px;
      right: 20px;
      bottom: 0;
      top: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      justify-items: center;
      align-items: end;
    }
    .fbar { width: 34px; border-radius: 6px 6px 0 0; background: linear-gradient(180deg, #466bc0, #2f4ca3); }
    .fbar.grey { background: #b7b7c4; }
    .fbar-labels {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      justify-items: center;
      margin: 0 20px;
      padding: 0 20px 0 34px;
      font-size: 14px;
      color: #6d6d7c;
    }
    .fbar-labels .active { color: #324ea4; }
    .kpi-box { margin: 18px 8px 0; }
    .kpi-box.extra-kpi { margin-top: 26px; }
    .kpi-label {
      background: var(--bsm-blue); color: #fff; font-weight: 900; text-transform: uppercase;
      padding: 8px 12px; font-size: 17px;
    }
    .kpi-value { padding: 14px 10px 0; font-size: 18px; font-weight: 900; }
    .kpi-value strong { font-size: 22px; }
    .kpi-value.red { color: var(--red); }

    .detail-body { padding: 8px 24px 0; flex: 1; }
    .detail-row > div:first-child {
      text-align: left;
      justify-self: start;
      padding-left: 4px;
    }
    .detail-head {
      display: grid;
      grid-template-columns:
      var(--site-col)
      var(--loc-col)
      2.2fr
      .9fr
      1.1fr
      1fr
      1fr
      1.25fr
      1.25fr;
      gap: 10px;
      color: var(--bsm-blue);
      font-weight: 900;
      font-size: 14px;
      padding: 0 4px 6px;
      text-transform: uppercase;
      align-items: end;
    }
    .detail-head .small { font-size: 12px; text-transform: none; }
    .region-bar {
      margin-top: 6px;
      background: var(--bsm-blue);
      color: #fff;
      display: grid; grid-template-columns: 1fr auto; gap: 12px;
      padding: 10px 20px; font-size: 25px; font-weight: 900; text-transform: uppercase;
    }
    .category-bar {
      color: var(--bsm-blue); font-size: 22px; font-weight: 900; font-style: italic;
      text-transform: uppercase; padding: 12px 40px 6px;
    }
    .detail-row {
      display: grid;
      grid-template-columns:
      var(--site-col)
      var(--loc-col)
      2.2fr
      .9fr
      1.1fr
      1fr
      1fr
      1.25fr
      1.25fr;
      gap: 10px;
      padding: 8px 4px;
      align-items: center;
      border-top: 2px solid #555;
      min-height: 62px;
      font-size: 15px;
    }
    .site-cell {
      color: var(--bsm-blue);
      font-weight: 900;
      text-align: right;
      justify-self: end;
      padding-right: 4px;
    }
    .loc-cell { color: var(--bsm-blue); font-weight: 900; font-size: 15px; }
    .addr-cell { font-size: 15px; }
    .blue-num { color: var(--bsm-blue); font-weight: 900; }
    .show-mins {
      text-align: center;
    }
    .extra-tag { color: var(--red); font-weight: 900; }
    .loc-cell .extra-tag { font-size: 13px; text-transform: uppercase; margin-left: 6px; }
    .detail-summary {
      margin-top: 22px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
      padding: 0 12px;
    }
    .ds-card { text-align: center; }
    .ds-label { background: var(--bsm-blue); color: #fff; font-size: 18px; font-weight: 900; text-transform: uppercase; padding: 8px 10px; }
    .ds-value { padding-top: 12px; font-size: 22px; font-weight: 900; color: var(--red); }
    .ds-value.black { color: #111; }

    .proof-grid {
      padding: 24px 34px 0;
      display: grid; grid-template-columns: 1fr 1fr; gap: 22px 16px; flex: 1;
    }    .proof-box {
      width: 540px;
      height: 300px;
      overflow: hidden;
      position: relative;
      background: #d8deee;
      border: 2px dashed #7b89b3;
      border-radius: 8px;

      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;

      color: #50608d;
      font-weight: 800;
      gap: 10px;
    }
    .proof-icon {
      width: 52px; height: 52px; border-radius: 50%; background: #6b7db7; color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }
    .proof-note {
      padding: 0 34px 16px; color: #47557d; font-size: 14px; font-weight: 700;
    }    .proof-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      cursor: grab;
      user-select: none;
      display: block;
      border-radius: 8px;
    }
    .proof-upload-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
    }
    .proof-upload-grid input {
      background: #fff;
      color: #111;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.16);
      padding: 7px 10px;
      width: 100%;
    }

    .contact-wrap {
  padding: 72px 74px 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1;
}
    .contact-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding-top: 10px;
}
.contact-logo {
  width: 285px;
  height: auto;
  object-fit: contain;
}
.contact-subbrand {

.detail-row > div:nth-child(9) {
  text-align: center;
  justify-self: center;
}

    .hidden { display: none !important; }
    .muted { color: var(--muted); }

    @media print {
      body { background: #fff; }
      .toolbar, .bar2 { display: none !important; }
      .document { padding: 0; gap: 0; }
      .page {
        width: 100%;
        min-height: 100vh;

        break-after: page;

      }
    }

</head>
<body>
  <div class="toolbar">
    <div class="field">
      <label>CSV List</label>
      <input id="csvInput" type="file" accept=".csv" />
    </div>
    <div class="field">
      <label>Client Name</label>
      <input id="clientName" placeholder="AAA" />
    </div>
    <div class="field">
      <label>Campaign Name</label>
      <input id="campaignName" placeholder="AAA Advertise" />
    </div>

  <script>
    function imageFileTo1920x1080DataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('Failed to read proof image.'));
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error('Failed to load proof image.'));
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 1920;
            canvas.height = 1080;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const targetRatio = 1920 / 1080;
            const imageRatio = img.width / img.height;
            let sx = 0, sy = 0, sw = img.width, sh = img.height;

            if (imageRatio > targetRatio) {
              sw = img.height * targetRatio;
              sx = (img.width - sw) / 2;
            } else if (imageRatio < targetRatio) {
              sh = img.width / targetRatio;
              sy = (img.height - sh) / 2;
            }

            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 1920, 1080);
            resolve(canvas.toDataURL('image/jpeg', 0.92));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('Failed to read proof image.'));
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    async function exportPDF() {
      try {
        if (!window.html2canvas) {
          alert('html2canvas failed to load.');
          return;
        }
        if (!window.jspdf || !window.jspdf.jsPDF) {
          alert('jsPDF failed to load.');
          return;
        }

        const { jsPDF } = window.jspdf;
        const pageElements = Array.from(document.querySelectorAll('.page'));

        if (!pageElements.length) {
          alert('No pages found to export.');
          return;
        }

        let pdf = null;

        for (let i = 0; i < pageElements.length; i++) {
          const el = pageElements[i];
          const oldShadow = el.style.boxShadow;
          el.style.boxShadow = 'none';

          const canvas = await html2canvas(el, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#ffffff',
            logging: false
          });

          el.style.boxShadow = oldShadow || '';

          const imgData = canvas.toDataURL('image/jpeg', 0.92);
          const pageWidth = canvas.width;
          const pageHeight = canvas.height;

          if (i === 0) {
            pdf = new jsPDF({
              orientation: pageWidth > pageHeight ? 'landscape' : 'portrait',
              unit: 'px',
              format: [pageWidth, pageHeight],
              compress: true
            });
          } else {
            pdf.addPage([pageWidth, pageHeight], pageWidth > pageHeight ? 'landscape' : 'portrait');
          }

          pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight, undefined, 'FAST');
        }

        const clientName = (document.getElementById('clientName')?.value || 'Client')
          .trim()
          .replace(/\s+/g, '')
          .replace(/[^a-z0-9_-]+/gi, '');

        const startDate = normalizeDateInput(document.getElementById('startDate')?.value);
        const endDate = normalizeDateInput(document.getElementById('endDate')?.value);

        function fileDate(date) {
          const dd = String(date.getDate()).padStart(2, '0');
          const mm = String(date.getMonth() + 1).padStart(2, '0');
          const yy = String(date.getFullYear()).slice(-2);
          return `${dd}${mm}${yy}`;
        }

        pdf.save(`Campaign Delivery Report_${clientName}_${fileDate(startDate)}${fileDate(endDate)}.pdf`);
      } catch (err) {
        console.error(err);
        alert('Export failed. Open Console to see the error.');
      }
    }

    const REGION_ORDER = [
      'Auckland City', 'North Shore City', 'East', 'West', 'South', 'Hamilton', 'Rotorua', 'Wellington', 'Christchurch', 'Queenstown'
    ];
    const REGION_LABEL_MAP = {
      'Auckland City': 'Auckland City',
      'North Shore City': 'North Shore',
      'East': 'East Auckland',
      'West': 'West Auckland',
      'South': 'South Auckland',
      'Hamilton': 'Hamilton',
      'Rotorua': 'Rotorua',
      'Wellington': 'Wellington',
      'Christchurch': 'Christchurch',
      'Queenstown': 'Queenstown'

    const CATEGORY_ORDER = ['Restaurant', 'Supermarket', 'Sports Centre', 'Service Centre'];
    const REGION_COLORS = ['#4dc0b1','#1f4f86','#9cbcc5','#6a54ba','#4a7ccf','#3050a6','#b04da2','#f3347c','#4c9b7e','#8556b8'];

      rawRows: [],

      proofImages: [null, null, null, null],

      generateBtn: document.getElementById('generateBtn'),
      printBtn: document.getElementById('printBtn'),
      document: document.getElementById('document'),
      regionGrid: document.getElementById('regionGrid'),
      statusText: document.getElementById('statusText'),
      proofInputs: [1,2,3,4].map(i => document.getElementById(`proofInput${i}`)),
    };

    function parseCSV(text) {
      const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(Boolean);
      if (!lines.length) return [];
      function splitCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          const next = line[i + 1];
          if (char === '"') {
            if (inQuotes && next === '"') { current += '"'; i++; }
            else { inQuotes = !inQuotes; }
          } else if (char === ',' && !inQuotes) {
            result.push(current);
            current = '';
          } else {
            current += char;
          }
        }
        result.push(current);
        return result.map(v => v.trim());
      }
      const headers = splitCSVLine(lines[0]);
      return lines.slice(1).map(line => {
        const values = splitCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => obj[h] = values[i] ?? '');
        return obj;
      });
    }

    function normalizeDateInput(value) {
      if (!value) return null;
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const [y,m,d] = value.split('-').map(Number);
        return new Date(y, m - 1, d);
      }
      if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(value)) {
        const [d,m,y] = value.split('/').map(Number);
        return new Date(y, m - 1, d);
      }
      const maybe = new Date(value);
      return Number.isNaN(maybe.getTime()) ? null : maybe;
    }

    function parseNumber(value) {
      const cleaned = String(value ?? '').replace(/[^\d.-]/g, '');
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : 0;
    }

    function daysInclusive(start, end) {
      const ms = end.setHours(0,0,0,0) - start.setHours(0,0,0,0);
      return Math.floor(ms / 86400000) + 1;
    }

    function formatDateDDMMYYYY(date) {
      const d = String(date.getDate()).padStart(2, '0');
      const m = String(date.getMonth()+1).padStart(2, '0');
      const y = date.getFullYear();
      return `${d}/${m}/${y}`;
    }

    function numberFmt(num) {
      return Math.round(num).toLocaleString('en-NZ');
    }

    function titleCaseCategory(value) {
      const v = String(value || '').trim().toLowerCase();
      if (v === 'sports centre' || v === 'sports center') return 'Sports Centre';
      if (v === 'services centre' || v === 'service centre' || v === 'services center' || v === 'service center') return 'Service Centre';
      if (v === 'supermarket') return 'Supermarket';
      return 'Restaurant';
    }

    function normalizeRegion(value) {
      const v = String(value || '').trim();
      if (v === 'North Shore') return 'North Shore City';
      if (v === 'Auckland City') return 'Auckland City';
      if (/^west/i.test(v)) return 'West';
      if (/^east/i.test(v)) return 'East';
      if (/^south/i.test(v)) return 'South';
      return v;
    }

    function normalizeRow(row) {
      return {
        id: parseNumber(row.id),
        city: String(row.city || '').trim(),
        name: String(row.name || '').trim(),
        address: String(row.address || '').trim(),
        region: normalizeRegion(row.region),
        category: titleCaseCategory(row.category),
        led_size: String(row.led_size || '').trim(),
        impressions_per_day: parseNumber(row.impressions_per_day),
        daily_operating_hours: parseNumber(row['Daily operating hours'] ?? row.daily_operating_hours),
        installation_date: normalizeDateInput(row['Installation Date'] ?? row.installation_date),
      };
    }

    function isValidScreen(row) {
      return row.name && row.address && row.region && row.led_size;
    }

    function regionSort(a, b) {
      const ai = REGION_ORDER.indexOf(a.region);
      const bi = REGION_ORDER.indexOf(b.region);
      if (ai !== bi) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      const ci = CATEGORY_ORDER.indexOf(a.category);
      const di = CATEGORY_ORDER.indexOf(b.category);
      if (ci !== di) return (ci === -1 ? 999 : ci) - (di === -1 ? 999 : di);
      return a.id - b.id;
    }

    function seedRegions(rows) {
      const present = [...new Set(rows.map(r => r.region).filter(Boolean))].sort((a,b) => {
        const ai = REGION_ORDER.indexOf(a), bi = REGION_ORDER.indexOf(b);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });
      els.regionGrid.innerHTML = present.map(region => {
        const count = rows.filter(r => r.region === region).length;
        return `<label class="region-pill"><input type="checkbox" data-region="${escapeHtml(region)}" checked /> <span>${escapeHtml(REGION_LABEL_MAP[region] || region)} (${count})</span></label>`;
      }).join('');
      state.selectedRegions = new Set(present);
      els.regionGrid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          if (cb.checked) state.selectedRegions.add(cb.dataset.region);
          else state.selectedRegions.delete(cb.dataset.region);
        });
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function buildComputed() {
      const client = els.clientName.value.trim() || 'AAA';
      const campaignName = els.campaignName.value.trim() || `${client} Advertise`;
      const start = normalizeDateInput(els.startDate.value);
      const end = normalizeDateInput(els.endDate.value);
      const adSeconds = parseNumber(els.adSeconds.value) || 15;
      if (!start || !end) throw new Error('Please choose start and end dates.');
      if (end < start) throw new Error('End date cannot be earlier than start date.');
      const totalDays = daysInclusive(new Date(start), new Date(end));
      const allRows = [...state.rawRows].sort(regionSort);
      const filtered = allRows.filter(r => state.selectedRegions.has(r.region)).sort(regionSort);
      if (!allRows.length) throw new Error('No valid screen rows loaded.');

      const details = filtered.map(row => {
        const installation = row.installation_date;
        const isExtra = installation && installation > start;
        const actualStart = isExtra ? installation : start;
        const actualEnd = end;
        const activeDays = actualStart > end ? 0 : daysInclusive(new Date(actualStart), new Date(actualEnd));
        const totalPlaysRaw = row.daily_operating_hours? (row.daily_operating_hours * 60 * activeDays) / 7: 0;
        const totalPlays = Math.round(totalPlaysRaw);
        const totalMins = Math.round((totalPlays * adSeconds) / 60);
        const totalImpressions = row.impressions_per_day * activeDays;
        return {
          ...row,
          isExtra,
          actualStart,
          actualEnd,
          activeDays,
          totalPlays,
          totalMins,
          totalImpressions,
          totalShowMinsText: `${numberFmt(totalMins)} Mins of ${activeDays} Days`,
        };
      }).filter(r => r.activeDays > 0);

      const marketRows = [...new Set(allRows.map(d => d.region))].map(region => {
        const allItems = allRows.filter(d => d.region === region);
        const selectedItems = details.filter(d => d.region === region);

        return {
          region,
          label: REGION_LABEL_MAP[region] || region,
          count: allItems.length,
          totalPlays: selectedItems.reduce((s, r) => s + r.totalPlays, 0),
          totalMins: selectedItems.reduce((s, r) => s + r.totalMins, 0),
        };
      });

      const platformStats = CATEGORY_ORDER.map(cat => {
        const count = details.filter(d => d.category === cat).length;
        const pct = details.length ? Math.round((count / details.length) * 100) : 0;
        return { cat, count, pct };
      }).filter(x => x.count > 0);

      const totals = {
        actualImpressions: details.reduce((s, r) => s + r.totalImpressions, 0),
        actualPlays: details.reduce((s, r) => s + r.totalPlays, 0),
        actualShowMins: details.reduce((s, r) => s + r.totalMins, 0),
      };
      const contractRows = details.filter(d => !d.isExtra);
      const contract = {
        impressions: contractRows.reduce((s, r) => s + r.totalImpressions, 0),
        plays: contractRows.reduce((s, r) => s + r.totalPlays, 0),
        mins: contractRows.reduce((s, r) => s + r.totalMins, 0),
      };
      const extra = {
        impressions: totals.actualImpressions - contract.impressions,
        plays: totals.actualPlays - contract.plays,
        mins: totals.actualShowMins - contract.mins,
      };

      const weeklyAudience = Math.round(
        allRows.reduce((s, r) => s + r.impressions_per_day, 0) * 7
      );
      const dd = String(start.getDate()).padStart(2, '0');
      const mm = String(start.getMonth() + 1).padStart(2, '0');
      const yyyy = String(start.getFullYear());
      const campaignId = `000${dd}${mm}${yyyy}`;
      const pages = paginateDetails(details);

      return {
        client,
        campaignName,
        campaignId,
        start,
        end,
        totalDays,
        weeksText: totalDays % 7 === 0 ? `${Math.round(totalDays/7)} Weeks (${totalDays} Days)` : `${(totalDays/7).toFixed(1)} Weeks (${totalDays} Days)`,
        adSeconds,
        details,
        marketRows,
        platformStats,
        platformsCount: platformStats.length,
        marketsCount: marketRows.length,
        totals,
        contract,
        extra,
        weeklyAudience,
        pages,
      };
    }

    function paginateDetails(details) {
      const groups = [];
      let currentRegion = null;
      let currentCategory = null;
      details.forEach(row => {
        const startsNewRegion = row.region !== currentRegion;
        const startsNewCat = startsNewRegion || row.category !== currentCategory;
        groups.push({ type: startsNewRegion ? 'region' : startsNewCat ? 'category' : 'row', row });
        if (!startsNewRegion && !startsNewCat) groups[groups.length - 1].type = 'row';
        if (startsNewRegion) groups.push({ type: 'category', row });
        else if (startsNewCat) groups.push({ type: 'category', row });
        groups.push({ type: 'row', row });
        currentRegion = row.region;
        currentCategory = row.category;
      });
      // Deduplicate duplicated pushes caused by simplified logic.
      const fixed = [];
      let lastRegion = null;
      let lastCategory = null;
      details.forEach(row => {
        if (row.region !== lastRegion) {
          fixed.push({ type: 'region', row });
          fixed.push({ type: 'category', row });
          lastRegion = row.region;
          lastCategory = row.category;
        } else if (row.category !== lastCategory) {
          fixed.push({ type: 'category', row });
          lastCategory = row.category;
        }
        fixed.push({ type: 'row', row });
      });

      const pages = [];
      let current = [];
      let budget = 0;
      fixed.forEach(item => {
        const cost = item.type === 'region' ? 2.4 : item.type === 'category' ? 1.3 : 1;
        if (budget + cost > 11.5 && current.length) {
          pages.push(current);
          current = [];
          budget = 0;
        }
        current.push(item);
        budget += cost;
      });
      if (current.length) pages.push(current);
      return pages;
    }

    function render() {
      if (!state.computed) {
        els.document.innerHTML = '';
        return;
      }
      const c = state.computed;
      const detailPagesHtml = c.pages.map((items, i) => renderDetailPage(c, items, i === c.pages.length - 1, i)).join('');

      els.document.innerHTML = `
        ${renderCoverPage(c)}
        ${renderOverviewPage(c)}
        ${renderProgressPage(c)}
        ${detailPagesHtml}
        ${renderProofPage(c)}
        ${renderContactPage()}
      `;
    }

          <div class="label">Campaign End Date:</div><div class="value">${formatDateDDMMYYYY(c.end)}</div>
          <div class="label">Campaign Weeks:</div><div class="value">${escapeHtml(c.weeksText)}</div>
        </div>
        <div class="cover-site">www.bigscreenmedia.co.nz</div>
      </section>`;
    }

              <div class="info-label">Campaign ID:</div><div class="info-value">${escapeHtml(c.campaignId)}</div>
              <div class="info-label">Client:</div><div class="info-value">${escapeHtml(c.client)}</div>
              <div class="info-label">Campaign Start Date:</div><div class="info-value">${formatDateDDMMYYYY(c.start)}</div>
              <div class="info-label">Campaign End Date:</div><div class="info-value">${formatDateDDMMYYYY(c.end)}</div>
            </div>
          </div>

          <div class="overview-table">
            <div class="ot-head">
              <div>Total LED screens</div>
              <div></div>

              <div>Total Played</div>
              <div>Total Mins</div>
            </div>

            ${c.marketRows.map((m, idx) => `
              <div class="ot-row">

}

    function renderPlatformStat(label, stat, icon) {
      const txt = stat ? `${numberFmt(stat.count)} ${stat.count === 1 ? 'Site' : 'Sites'} / ${stat.pct}%` : '0 Sites / 0%';

      const iconMap = {
        'Restaurant': 'img/restaurant.png',
        'Sports Centre': 'img/sports-centre.png',
        'Supermarket': 'img/supermarket.png',
        'Service Centre': 'img/service-centre.png'
      };

      return `
        <div class="pstat">
          <div class="picon">
            <img src="${iconMap[label]}" class="picon-img" />
          </div>
          <div class="ptext">
            <div class="name">${label}</div>
            <div class="val">${txt}</div>
          </div>
        </div>`;
    }

    function renderProgressPage(c) {
      const bars = [
        { title:'TOTAL IMPRESSIONS:', actual:c.totals.actualImpressions, contract:c.contract.impressions, extra:c.extra.impressions, suffix:'' },
        { title:'TOTAL PLAYS TIMES:', actual:c.totals.actualPlays, contract:c.contract.plays, extra:c.extra.plays, suffix:' TIMES' },
        { title:'TOTAL SHOW MINS:', actual:c.totals.actualShowMins, contract:c.contract.mins, extra:c.extra.mins, suffix:' MINS' },
      ];
      return `
      <section class="page progress-page">
        <div class="inner-header"><div>Delivery Progress</div><div>Client: ${escapeHtml(c.client)}</div></div>
        <div class="progress-body">
          <div class="progress-info">
            <div>
              <div class="progress-line"><span class="pl-label">Media Owner:</span><span class="pl-value">Big Screen Media Limited</span></div>
              <div class="progress-line"><span class="pl-label">Campaign:</span><span class="pl-value">${escapeHtml(c.campaignName)}</span></div>
            </div>
            <div>
              <div class="progress-line"><span class="pl-label">Campaign Weeks:</span><span class="pl-value">${escapeHtml(c.weeksText)}</span></div>
              <div class="progress-line"><span class="pl-label">Digital Delivery:</span><span class="pl-value">${numberFmt(c.totals.actualPlays)} of ${numberFmt(c.contract.plays)}</span></div>
            </div>
          </div>
          <div class="charts">
            ${bars.map(b => renderChartCard(b)).join('')}
          </div>
        </div>
        <div class="small-footer blue"><div class="footer-strip"><img src="img/bsmlogo.png" class="footer-logo" /></div><div class="footer-url">www.bigscreenmedia.co.nz</div></div>
      </section>`;
    }

    function renderChartCard(b) {
      const max = Math.max(b.actual, b.contract, 1);
      const h1 = Math.max(34, Math.round((b.actual / max) * 160));
      const h2 = Math.max(34, Math.round((b.contract / max) * 160));
      const showArrow = b.extra > 0;

      return `
        <div class="chart-card">
          <div class="chart-title">${b.title}</div>

          <div class="fake-chart">
            <div class="fake-bars">
              <div class="bar-wrap">
                <div class="bar-value">${numberFmt(b.actual)}</div>
                <div class="fbar" style="height:${h1}px"></div>
              </div>

              <div class="bar-wrap">
                <div class="bar-value contract">${numberFmt(b.contract)}</div>
                <div class="fbar grey" style="height:${h2}px"></div>
              </div>
            </div>
          </div>

          <div class="fbar-labels"><span class="active">Actual</span><span>Contract</span></div>

          <div class="kpi-box">
            <div class="kpi-label">Actual ${b.title.replace(':','')}</div>
            <div class="kpi-value"><strong>${numberFmt(b.actual)}</strong>${b.suffix}</div>
          </div>

          <div class="kpi-box">
            <div class="kpi-label">Contract ${b.title.replace(':','')}</div>
            <div class="kpi-value"><strong>${numberFmt(b.contract)}</strong>${b.suffix}</div>
          </div>

          <div class="kpi-box extra-kpi">
            <div class="kpi-label">Extra ${b.title.replace(':','')}</div>
            <div class="kpi-value red">
              <strong>${numberFmt(b.extra)}</strong>${b.suffix}
              ${showArrow ? '<span class="extra-arrow">⌃</span>' : ''}
            </div>
          </div>
        </div>`;
    }

    function renderDetailPage(c, items, isLast, pageIndex) {
      let rowCounter = c.pages
        .slice(0, pageIndex)
        .flat()
        .filter(x => x.type === 'row').length;
      const rowsHtml = items.map(item => {
        if (item.type === 'region') {
          const count = c.details.filter(r => r.region === item.row.region).length;
          return `<div class="region-bar"><div>${escapeHtml((REGION_LABEL_MAP[item.row.region] || item.row.region).toUpperCase())}</div><div>${count} Panels</div></div>`;
        }
        if (item.type === 'category') {
          return `<div class="category-bar">${escapeHtml(item.row.category.toUpperCase())}</div>`;
        }
        const r = item.row;
        return `<div class="detail-row">
          <div class="site-cell">${++rowCounter}</div>
          <div class="loc-cell">${escapeHtml(r.name)}${r.isExtra ? '<span class="extra-tag">extra</span>' : ''}</div>
          <div class="addr-cell">${escapeHtml(r.address)}</div>
          <div>${escapeHtml(r.led_size)}</div>
          <div class="${r.isExtra ? 'extra-tag' : 'blue-num'}">${numberFmt(r.impressions_per_day)}</div>
          <div>${formatDateDDMMYYYY(r.actualStart)}</div>
          <div>${formatDateDDMMYYYY(r.actualEnd)}</div>
          <div class="${r.isExtra ? 'extra-tag' : 'blue-num'}">${numberFmt(r.totalPlays)}</div>
          <div class="show-mins">
            <div>
              <span class="${r.isExtra ? 'extra-tag' : ''}">${numberFmt(r.totalMins)}</span> Mins of
            </div>
            <div>
              <span class="${r.isExtra ? 'extra-tag' : ''}">${r.activeDays}</span> Days
            </div>
          </div>
        </div>`;
      }).join('');

      return `
      <section class="page detail-page">
        <div class="inner-header"><div>LED Screen Digital Delivery</div><div>Client: ${escapeHtml(c.client)}</div></div>
        <div class="detail-body">
          <div class="detail-head">
            <div>SITE<br/>No.</div>
            <div>ADVERTISING LOCATION</div>
            <div>ADDRESS</div>
            <div>SIZE</div>
            <div class="th">
              <div>IMPRESSIONS</div>
              <div class="sub">(PER DAY)</div>
            </div>
            <div>START DAY</div>
            <div>END DAY</div>
            <div class="th">
              <div>TOTAL PLAYS</div>
              <div class="sub">(Times)</div>
            </div>
            <div class="th">
              <div>TOTAL SHOW</div>
              <div class="sub">MINS</div>
            </div>
          </div>
          ${rowsHtml}
          ${isLast ? `<div class="detail-summary">
            <div class="ds-card"><div class="ds-label">Total Impressions:</div><div class="ds-value">${numberFmt(c.totals.actualImpressions)}</div></div>
            <div class="ds-card"><div class="ds-label">Total Plays</div><div class="ds-value">${numberFmt(c.totals.actualPlays)} TIMES</div></div>
            <div class="ds-card"><div class="ds-label">Total Show Mins:</div><div class="ds-value">${numberFmt(c.totals.actualShowMins)} MINS</div></div>
          </div>` : ''}
        </div>
        <div class="small-footer blue"><div class="footer-strip"><img src="img/bsmlogo.png" class="footer-logo" /></div><div class="footer-url">www.bigscreenmedia.co.nz</div></div>
      </section>`;
    }

    function renderProofPage(c) {
      return `
      <section class="page proof-page">
        <div class="inner-header"><div>Proof of Delivery Image</div><div>Client: ${escapeHtml(c.client)}</div></div>
        <div class="proof-grid">
          ${Array.from({length:4}).map((_,i) => { const src = state.proofImages[i]; const pos = state.proofPositions?.[i] || '50% 50%'; return `<div class="proof-box" data-proof-index="${i}">${src ? `<img src="${src}" alt="Proof image ${i+1}" data-proof-index="${i}" data-pos="${pos}" style="object-position:${pos};" />` : `<div class="proof-icon">🖼</div><div>Placeholder image ${i+1}</div><div>Replace with your real proof image</div>`}</div>`; }).join('')}
        </div>
        <div class="small-footer blue"><div class="footer-strip"><img src="img/bsmlogo.png" class="footer-logo" /></div><div class="footer-url">www.bigscreenmedia.co.nz</div></div>
      </section>`;
    }

    function renderContactPage() {
  return `
  <section class="page contact-page">
    <div class="contact-wrap">
      <div class="contact-left">
        <img src="img/bsmlogo.png" class="contact-logo" />
        <div class="contact-subbrand">Indoor and Outdoor Digital Advertising</div>
      </div>

      <div class="contact-right">

        <div class="contact-list">

            <div class="mini-icon">

            </div>
          </div>
        </div>

        <div class="qr-wrap">
          <div class="wechat-icon">

    <div class="contact-footer-line">Nationwide Digital Advertising, Creative Brand Exposure!</div>

}
    function fitOverviewValues() {
      document.querySelectorAll('.overview-info').forEach(box => {
        const items = Array.from(box.children);
        const labels = [];
        const values = [];

        for (let i = 0; i < items.length; i += 2) {
          if (items[i]) labels.push(items[i]);
          if (items[i + 1]) values.push(items[i + 1]);
        }

        const gap = parseFloat(getComputedStyle(box).columnGap) || 0;
        const maxLabelWidth = Math.max(
          ...labels.map(label => label.getBoundingClientRect().width)
        );
        const available = Math.max(80, box.clientWidth - maxLabelWidth - gap);

        values.forEach(value => {
          value.style.fontSize = '18px';
          value.style.transform = 'none';
          value.style.width = 'auto';

          let size = 18;

          while (value.getBoundingClientRect().width > available && size > 15) {
            size -= 0.2;
            value.style.fontSize = size + 'px';
          }

          if (value.getBoundingClientRect().width > available) {
            const scale = Math.max(0.80, available / value.getBoundingClientRect().width);
            value.style.transform = `scaleX(${scale})`;
          }
        });
      });
    }

    function loadCsvText(text) {
      state.rawRows = parseCSV(text).map(normalizeRow).filter(isValidScreen);
      if (!state.rawRows.length) {
        els.statusText.textContent = 'No valid rows found.';
        return;
      }
      seedRegions(state.rawRows);
      els.statusText.textContent = `${state.rawRows.length} valid screen rows loaded. Choose regions, fill campaign inputs, then click Generate Report.`;
    }

    els.csvInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => loadCsvText(evt.target.result);
      reader.readAsText(file, 'utf-8');
    });

    els.proofInputs.forEach((input, index) => {
      input.addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) {
          state.proofImages[index] = null;
          state.proofPositions[index] = '50% 50%';
          if (state.computed) { render(); requestAnimationFrame(fitOverviewValues); }
          return;
        }
        try {
          state.proofImages[index] = await fileToDataURL(file);
          state.proofPositions[index] = '50% 50%';
          if (state.computed) { render(); requestAnimationFrame(fitOverviewValues); }
        } catch (err) {
          console.error(err);
          alert(err.message || 'Proof image resize failed.');
        }
      });
    });

    els.generateBtn.addEventListener('click', () => {
      try {
        if (!state.rawRows.length) throw new Error('Please upload a CSV first.');
        state.computed = buildComputed();
        render();
        requestAnimationFrame(fitOverviewValues);
        els.statusText.textContent = `Report generated: ${state.computed.details.length} selected screens, ${state.computed.marketsCount} markets, ${state.computed.platformsCount} platforms.`;
      } catch (err) {
        alert(err.message);
      }
    });

    els.printBtn.addEventListener('click', () => {
      exportPDF();
    });


    document.addEventListener('mousedown', e => {
      const img = e.target.closest('.proof-box img');
      if (!img) return;

      e.preventDefault();
      img.style.cursor = 'grabbing';

      const index = Number(img.dataset.proofIndex);
      const startX = e.clientX;
      const startY = e.clientY;

      const current = (img.dataset.pos || '50% 50%').replace(/%/g, '').split(' ');
      const startPosX = parseFloat(current[0]) || 50;
      const startPosY = parseFloat(current[1]) || 50;

      function move(ev) {
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;

        const newX = Math.max(-50, Math.min(150, startPosX - dx * 1.2));
        const newY = Math.max(-50, Math.min(150, startPosY - dy * 1.2));

        const pos = `${newX}% ${newY}%`;
        img.style.objectPosition = pos;
        img.dataset.pos = pos;

        if (Number.isInteger(index) && state.proofPositions[index] !== undefined) {
          state.proofPositions[index] = pos;
        }
      }

      function up() {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        img.style.cursor = 'grab';
      }

      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });

    window.addEventListener('resize', fitOverviewValues);
  </script>
</body>
</html>
